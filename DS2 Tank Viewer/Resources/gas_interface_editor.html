<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAS Interface Editor — Dungeon Siege II</title>
<style>
  :root{
    --bg-0:#15181c;
    --bg-1:#1b1f24;
    --bg-2:#22262c;
    --bg-3:#2a2f36;
    --line:#363c44;
    --line-soft:#2a2f36;
    --text-0:#e9e6de;
    --text-1:#a9aeb6;
    --text-2:#71767e;
    --gold:#c99a4b;
    --gold-bright:#e8b95c;
    --gold-dim:#8a6c38;
    --danger:#c1594f;
    --ok:#5c9e6f;
    --mono: "SF Mono", "JetBrains Mono", Consolas, Menlo, monospace;
    --sans: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-0); color:var(--text-0);
    font-family:var(--sans);
    overflow:hidden;
  }
  ::selection{ background:var(--gold-dim); color:#fff;}

  /* ---------- layout shell ---------- */
  #app{
    display:grid;
    grid-template-rows:auto 1fr auto;
    grid-template-columns: 300px 1fr;
    grid-template-areas:
      "topbar topbar"
      "sidebar canvas"
      "statusbar statusbar";
    height:100vh;
  }

  /* ---------- top bar ---------- */
  #topbar{
    grid-area:topbar;
    display:flex; align-items:center; gap:14px;
    padding:10px 16px;
    background:linear-gradient(180deg,#20242a,#1b1f24);
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .brand{
    display:flex; align-items:center; gap:9px;
    font-family:var(--sans); font-weight:700; letter-spacing:.2px;
    color:var(--gold-bright); font-size:14.5px;
    margin-right:6px; white-space:nowrap;
  }
  .brand .mark{
    width:20px;height:20px; border-radius:4px;
    background:
      linear-gradient(135deg,var(--gold) 0%, var(--gold-dim) 100%);
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#1b1200;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .divider{ width:1px; height:26px; background:var(--line); }

  .btn{
    appearance:none; border:1px solid var(--line);
    background:var(--bg-2); color:var(--text-0);
    padding:7px 12px; border-radius:6px; font-size:12.5px;
    font-family:var(--sans); font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
    white-space:nowrap;
    transition:border-color .12s, background .12s, transform .05s;
  }
  .btn:hover{ background:var(--bg-3); border-color:#454c55; }
  .btn:active{ transform:translateY(1px); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn.primary{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-color:var(--gold-dim); color:#1c1300;
  }
  .btn.primary:hover{ filter:brightness(1.06); }
  .btn.ghost{ background:transparent; }
  .btn svg{ width:14px; height:14px; flex:none; }

  select, input[type=text], input[type=number]{
    background:var(--bg-2); border:1px solid var(--line); color:var(--text-0);
    border-radius:6px; padding:6px 8px; font-size:12.5px; font-family:var(--sans);
  }
  select:focus, input:focus{ outline:none; border-color:var(--gold-dim); }

  .field-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.6px;
    color:var(--text-2); margin-bottom:4px; display:block; font-weight:700;
  }
  .field-group{ display:flex; flex-direction:column; }
  .spacer{ flex:1; }
  #filename-tag{
    font-family:var(--mono); font-size:12px; color:var(--text-1);
    background:var(--bg-2); border:1px solid var(--line);
    padding:6px 10px; border-radius:6px; max-width:220px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- sidebar ---------- */
  #sidebar{
    grid-area:sidebar;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  #sidebar .panel-head{
    padding:12px 14px 8px;
    display:flex; align-items:center; justify-content:space-between;
  }
  #sidebar .panel-head h2{
    font-size:11px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--text-2); margin:0; font-weight:800;
  }
  #search-wrap{ padding:0 12px 10px; }
  #search{ width:100%; }

  #elements-list{
    flex:1 1 auto; overflow-y:auto; padding:4px 8px 10px;
  }
  .el-row{
    display:flex; align-items:center; gap:8px;
    padding:6px 8px; border-radius:6px; cursor:pointer;
    font-size:12.3px; color:var(--text-1);
    border:1px solid transparent;
  }
  .el-row:hover{ background:var(--bg-2); color:var(--text-0); }
  .el-row.selected{ background:#3a2e17; border-color:var(--gold-dim); color:var(--gold-bright); }
  .el-row .dot{ width:8px; height:8px; border-radius:2px; flex:none; }
  .el-row .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; font-family:var(--mono); }
  .el-row .tp{ font-size:10px; color:var(--text-2); flex:none; }
  .el-row.hidden-el{ opacity:.45; }
  .el-row.eye-off{ opacity:.4; }
  .el-row.eye-off .nm{ text-decoration:line-through; text-decoration-color:var(--text-2); }
  .eye-btn{
    appearance:none; border:none; background:transparent; padding:2px;
    display:flex; align-items:center; justify-content:center; flex:none;
    color:var(--text-2); cursor:pointer; border-radius:4px;
  }
  .eye-btn svg{ width:13px; height:13px; }
  .eye-btn:hover{ background:var(--bg-3); color:var(--text-0); }
  .eye-btn.off{ color:var(--danger); }
  .eye-btn.off:hover{ color:#e08880; }
  input:disabled{ opacity:.4; cursor:not-allowed; }
  .el-row .nm.indent1{ padding-left:12px; }
  .el-row .nm.indent2{ padding-left:24px; }
  .el-row .nm.indent3{ padding-left:36px; }

  /* ---------- properties panel ---------- */
  #props{
    border-top:1px solid var(--line);
    background:var(--bg-1);
    padding:12px 14px 16px;
    max-height:46%;
    overflow-y:auto;
    flex:none;
  }
  #props h2{
    font-size:11px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--text-2); margin:0 0 10px; font-weight:800;
  }
  #props .empty-hint{ color:var(--text-2); font-size:12.5px; line-height:1.5; }
  .prop-title{
    font-family:var(--mono); font-size:14px; color:var(--gold-bright);
    margin-bottom:2px; word-break:break-all;
  }
  .prop-sub{ font-size:11px; color:var(--text-2); margin-bottom:12px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:8px 10px; margin-bottom:10px; }
  .grid2 input{ width:100%; font-family:var(--mono); }
  .kv{
    display:flex; justify-content:space-between; gap:8px;
    font-size:11.5px; color:var(--text-1); padding:3px 0;
    border-bottom:1px dashed var(--line-soft);
  }
  .kv b{ color:var(--text-0); font-weight:600; font-family:var(--mono); font-size:11px; text-align:right; word-break:break-all; }

  /* ---------- canvas area ---------- */
  #canvas-area{
    grid-area:canvas;
    position:relative;
    overflow:auto;
    background:
      radial-gradient(circle at 30% 20%, #23272d 0%, #14171b 70%);
    display:flex; align-items:flex-start; justify-content:flex-start;
    padding:40px;
  }
  #canvas-area.empty{ align-items:center; justify-content:center; }
  #drop-hint{
    text-align:center; color:var(--text-2); max-width:420px;
  }
  #drop-hint .big{ font-size:16px; color:var(--text-1); margin-bottom:8px; font-weight:700;}
  #drop-hint kbd{
    background:var(--bg-2); border:1px solid var(--line); padding:1px 6px;
    border-radius:4px; font-family:var(--mono); font-size:11px;
  }

  #stage-outer{
    position:relative;
    flex:none;
  }
  #stage-label{
    position:absolute; top:-24px; left:0;
    font-family:var(--mono); font-size:11px; color:var(--text-2);
  }
  #stage{
    position:relative;
    background-color:#0c0e10;
    background-image:
      linear-gradient(rgba(201,154,75,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,154,75,.10) 1px, transparent 1px);
    outline:1px solid var(--line);
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    user-select:none;
  }
  #stage.no-grid{ background-image:none; }

  .el-box{
    position:absolute;
    border:1.5px solid var(--box-color, #6ea8ff);
    background:color-mix(in srgb, var(--box-color, #6ea8ff) 14%, transparent);
    cursor:grab;
    box-sizing:border-box;
  }
  .el-box:hover{ background:color-mix(in srgb, var(--box-color, #6ea8ff) 26%, transparent); }
  .el-box.selected{
    border-color:var(--gold-bright);
    background:color-mix(in srgb, var(--gold-bright) 20%, transparent);
    z-index:500;
    box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 14px rgba(232,185,92,.35);
  }
  .el-box.dim{ opacity:.35; border-style:dashed; }
  .el-box.dragging{ cursor:grabbing; opacity:.85; }
  .el-box .tag{
    position:absolute; left:0; top:-18px;
    font-family:var(--mono); font-size:10px; line-height:16px;
    background:var(--bg-2); color:var(--text-1);
    padding:0 5px; border-radius:3px; border:1px solid var(--line);
    white-space:nowrap; pointer-events:none;
    max-width:260px; overflow:hidden; text-overflow:ellipsis;
  }
  .el-box.selected .tag{ background:var(--gold-bright); color:#1c1300; border-color:var(--gold-dim); font-weight:700;}

  .handle{
    position:absolute; width:9px; height:9px;
    background:var(--gold-bright); border:1px solid #1c1300;
    border-radius:2px; z-index:600;
  }
  .h-n{ top:-5px; left:50%; margin-left:-5px; cursor:ns-resize; }
  .h-s{ bottom:-5px; left:50%; margin-left:-5px; cursor:ns-resize; }
  .h-e{ right:-5px; top:50%; margin-top:-5px; cursor:ew-resize; }
  .h-w{ left:-5px; top:50%; margin-top:-5px; cursor:ew-resize; }
  .h-ne{ top:-5px; right:-5px; cursor:nesw-resize; }
  .h-nw{ top:-5px; left:-5px; cursor:nwse-resize; }
  .h-se{ bottom:-5px; right:-5px; cursor:nwse-resize; }
  .h-sw{ bottom:-5px; left:-5px; cursor:nesw-resize; }

  #coord-readout{
    position:fixed; pointer-events:none; z-index:9999;
    font-family:var(--mono); font-size:11px;
    background:rgba(20,22,25,.92); color:var(--gold-bright);
    border:1px solid var(--line); padding:3px 7px; border-radius:5px;
    display:none;
  }

  /* ---------- status bar ---------- */
  #statusbar{
    grid-area:statusbar;
    display:flex; align-items:center; gap:16px;
    padding:6px 16px; background:var(--bg-1); border-top:1px solid var(--line);
    font-size:11.5px; color:var(--text-2); font-family:var(--mono);
  }
  #statusbar .msg{ color:var(--text-1); }
  #statusbar .spacer{ flex:1; }

  /* legend */
  #legend{ display:flex; gap:10px; flex-wrap:wrap; padding:0 12px 10px; }
  .legend-item{ display:flex; align-items:center; gap:5px; font-size:10.5px; color:var(--text-2); }
  .legend-item .dot{ width:7px; height:7px; border-radius:2px; }

  input[type=checkbox]{ accent-color:var(--gold); }
  .toggle-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-1); }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#3a4048; border-radius:6px; border:2px solid var(--bg-1); }
  ::-webkit-scrollbar-thumb:hover{ background:#4a515a; }
</style>
</head>
<body>

<div id="app">

  <!-- ============ TOP BAR ============ -->
  <div id="topbar">
    <div class="brand"><span class="mark">GS</span> GAS Interface Editor</div>
    <div class="divider"></div>

    <div class="field-group">
      <label class="field-label">File</label>
      <div style="display:flex; gap:6px;">
        <button class="btn" id="btn-load">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
          Open .gas
        </button>
        <input type="file" id="file-input" accept=".gas,.txt" style="display:none;">
        <select id="example-select">
          <option value="">Load example…</option>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Canvas scale</label>
      <select id="scale-select"></select>
    </div>

    <div class="field-group">
      <label class="field-label">View</label>
      <div style="display:flex; gap:12px; align-items:center; height:31px;">
        <label class="toggle-row"><input type="checkbox" id="toggle-grid" checked> Grid</label>
        <label class="toggle-row"><input type="checkbox" id="toggle-hidden" checked> Hidden els</label>
        <label class="toggle-row"><input type="checkbox" id="toggle-snap"> Snap 5px</label>
      </div>
    </div>

    <div class="spacer"></div>
    <div id="filename-tag">No file loaded</div>
    <button class="btn ghost" id="btn-reset" disabled title="Discard all edits, reload original text">Reset</button>
    <button class="btn primary" id="btn-download" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 12l-4-4m4 4l4-4M4 3h16"/></svg>
      Download .gas
    </button>
  </div>

  <!-- ============ SIDEBAR ============ -->
  <div id="sidebar">
    <div class="panel-head">
      <h2>Elements</h2>
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="el-count" style="font-size:11px;color:var(--text-2);"></span>
        <button class="btn ghost" id="btn-show-all" title="Show all elements on canvas (editor-only)" style="padding:3px 7px; font-size:10.5px;">Show all</button>
        <button class="btn ghost" id="btn-hide-all" title="Hide all elements from canvas (editor-only, list stays)" style="padding:3px 7px; font-size:10.5px;">Hide all</button>
      </div>
    </div>
    <div id="search-wrap"><input type="text" id="search" placeholder="Filter by name or type…"></div>
    <div id="legend"></div>
    <div id="elements-list"></div>
    <div id="props">
      <h2>Properties</h2>
      <div id="props-body"><div class="empty-hint">Select an element on the canvas or from the list to edit its rect.</div></div>
    </div>
  </div>

  <!-- ============ CANVAS ============ -->
  <div id="canvas-area" class="empty">
    <div id="drop-hint">
      <div class="big">No interface loaded</div>
      Open a Dungeon Siege II <b>.gas</b> file, drag one onto this window, or pick a bundled example above to start editing element positions visually.
    </div>
    <div id="stage-outer" style="display:none;">
      <div id="stage-label"></div>
      <div id="stage"></div>
    </div>
  </div>

  <!-- ============ STATUS BAR ============ -->
  <div id="statusbar">
    <span class="msg" id="status-msg">Ready.</span>
    <span class="spacer"></span>
    <span id="status-selected"></span>
  </div>

</div>

<div id="coord-readout"></div>

function parseGas(text) {
  let i = 0;
  const n = text.length;
  function isWS(c){return c===' '||c==='\t'||c==='\r'||c==='\n';}
  function skipWS(){
    while(i<n){
      if(isWS(text[i])) {i++; continue;}
      if(text[i]==='/'&&text[i+1]==='/'){ while(i<n&&text[i]!=='\n') i++; continue;}
      break;
    }
  }
  function readIdent(){
    let start=i;
    while(i<n && /[A-Za-z0-9_\.\-\$]/.test(text[i])) i++;
    return text.slice(start,i);
  }
  function parseBlockHeader(){
    i++; // consume [
    let start=i;
    while(i<n && text[i]!==']') i++;
    let header = text.slice(start,i);
    i++; // consume ]
    let attrs = {};
    let parts = header.split(',');
    for(const p of parts){
      const idx = p.indexOf(':');
      if(idx>=0){
        attrs[p.slice(0,idx).trim()] = p.slice(idx+1).trim();
      } else if(p.trim()){
        attrs['_name']=p.trim();
      }
    }
    return attrs;
  }
  function parseValue(){
    skipWS();
    if(text[i]==='['&&text[i+1]==='['){
      i+=2;
      let start=i;
      let end = text.indexOf(']]', i);
      if(end<0) end=n;
      let raw = text.slice(start,end);
      i = end+2;
      skipWS();
      if(text[i]===';') i++;
      return {raw, start, end, isScript:true};
    }
    let start=i;
    let inQuote=false;
    while(i<n){
      const c=text[i];
      if(c==='"') inQuote=!inQuote;
      if(!inQuote && c===';') break;
      if(!inQuote && c==='}') break;
      i++;
    }
    let end = i;
    let raw = text.slice(start,end);
    if(text[i]===';') i++;
    // trim start/end for exact value span (excluding surrounding whitespace)
    let trimStart = start, trimEnd = end;
    while(trimStart<trimEnd && isWS(text[trimStart])) trimStart++;
    while(trimEnd>trimStart && isWS(text[trimEnd-1])) trimEnd--;
    return {raw: text.slice(trimStart,trimEnd), start: trimStart, end: trimEnd};
  }

  function parseChildren(){
    const children=[];
    while(i<n){
      skipWS();
      if(i>=n) break;
      if(text[i]==='}') break;
      if(text[i]==='['){
        const blockStart = i;
        const attrs = parseBlockHeader();
        skipWS();
        if(text[i]==='{'){
          i++;
          const kids = parseChildren();
          skipWS();
          if(text[i]==='}') i++;
          children.push({kind:'block', attrs, children:kids, start:blockStart, end:i});
        } else {
          children.push({kind:'block', attrs, children:[], start:blockStart, end:i});
        }
      } else {
        const propStart = i;
        let tok1 = readIdent();
        if(tok1===''){ i++; continue; } // safety against infinite loop
        skipWS();
        let key, typePrefix=null;
        if(text[i]==='='){
          key=tok1;
        } else {
          typePrefix = tok1;
          skipWS();
          key = readIdent();
          skipWS();
        }
        if(text[i]==='='){
          i++;
          const val = parseValue();
          children.push({kind:'prop', key, typePrefix, value: val.raw, valueStart: val.start, valueEnd: val.end, start:propStart, end:i});
        } else {
          i++;
        }
      }
    }
    return children;
  }
  const root = parseChildren();
  return root;
}

/* ---------- base64 (utf-8 safe) decode for embedded examples ---------- */
function b64ToUtf8(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

/* ---------- type color map ---------- */
const TYPE_COLORS = {
  window:      '#6ea8ff',
  button:      '#5cc98a',
  text:        '#f2a94e',
  text_box:    '#f2d24e',
  gridbox:     '#b586f2',
  itemslot:    '#f26e9c',
  object_view: '#4ed4c9',
  interface:   '#888',
};
function colorForType(t){
  if(TYPE_COLORS[t]) return TYPE_COLORS[t];
  // stable hash fallback for unseen types
  let h = 0;
  for(let i=0;i<t.length;i++) h = (h*31 + t.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return `hsl(${hue} 70% 62%)`;
}

/* ---------- collect rect-bearing elements from a parsed tree ---------- */
function collectElements(nodes, depth, parentName, out){
  for(const node of nodes){
    if(node.kind !== 'block') continue;
    const t = node.attrs.t;
    const nm = node.attrs.n || node.attrs._name || '(unnamed)';
    if(t){
      const rectProp = node.children.find(c => c.kind==='prop' && c.key==='rect');
      const visProp  = node.children.find(c => c.kind==='prop' && c.key==='visible');
      const orderProp= node.children.find(c => c.kind==='prop' && c.key==='draw_order');
      const texProp  = node.children.find(c => c.kind==='prop' && c.key==='texture');
      const textProp = node.children.find(c => c.kind==='prop' && c.key==='text');
      if(rectProp){
        const nums = rectProp.value.split(',').map(s=>parseFloat(s.trim()));
        if(nums.length===4 && nums.every(v=>!isNaN(v))){
          out.push({
            type:t, name:nm, depth, parent:parentName,
            rect:[nums[0],nums[1],nums[2],nums[3]],
            valueStart: rectProp.valueStart, valueEnd: rectProp.valueEnd,
            visible: visProp ? visProp.value.trim() !== 'false' : true,
            drawOrder: orderProp ? orderProp.value.trim() : null,
            texture: texProp ? texProp.value.trim() : null,
            text: textProp ? textProp.value.trim() : null,
            // editable props: offsets recorded only when the property actually
            // exists in the source file (so we can splice-edit it in place).
            // Properties absent from the file are left un-editable in v1 rather
            // than inventing a formatting convention to insert a brand-new line.
            props: {
              draw_order: orderProp ? {value:orderProp.value.trim(), valueStart:orderProp.valueStart, valueEnd:orderProp.valueEnd, typePrefix:orderProp.typePrefix} : null,
              texture:    texProp   ? {value:texProp.value.trim(), valueStart:texProp.valueStart, valueEnd:texProp.valueEnd, typePrefix:texProp.typePrefix} : null,
              visible:    visProp   ? {value:visProp.value.trim(), valueStart:visProp.valueStart, valueEnd:visProp.valueEnd, typePrefix:visProp.typePrefix} : null,
            },
          });
        }
      }
    }
    collectElements(node.children, depth+1, nm, out);
  }
}

/* ---------- status helper ---------- */
function setStatus(msg){ els.statusMsg.textContent = msg; }

/* ---------- loading a file ---------- */
function loadGasText(text, fileName){
  state.fileName = fileName;
  state.originalText = text;
  state.sourceText = text;
  state.undoStack = [];
  state.selected = -1;
  state.editorHidden = new Set();
  reparse();
  els.filenameTag.textContent = fileName;
  els.filenameTag.title = fileName;
  els.btnDownload.disabled = false;
  els.btnReset.disabled = false;
  els.canvasArea.classList.remove('empty');
  els.dropHint.style.display = 'none';
  els.stageOuter.style.display = '';
  setStatus(`Loaded ${fileName} — ${state.elements.length} positioned element${state.elements.length===1?'':'s'}.`);
  renderAll();
}

function reparse(){
  state.tree = parseGas(state.sourceText);
  const out = [];
  collectElements(state.tree, 0, null, out);
  state.elements = out;
}

/* ---------- committing an edit: splice source text, reparse ---------- */
function commitRectEdit(index, newRect){
  const el = state.elements[index];
  if(!el) return;
  const [x1,y1,x2,y2] = newRect.map(v=>Math.round(v));
  const newStr = `${x1},${y1},${x2},${y2}`;
  state.undoStack.push(state.sourceText);
  if(state.undoStack.length > 200) state.undoStack.shift();
  state.sourceText = state.sourceText.slice(0, el.valueStart) + newStr + state.sourceText.slice(el.valueEnd);
  reparse();
  renderAll();
}

/* generic editable-property commit (draw_order, texture, visible).
   Only works when the property already exists in the source file -- see the
   comment in collectElements() for why we don't synthesize new lines yet. */
function commitPropEdit(index, key, newValueStr){
  const el = state.elements[index];
  const p = el.props && el.props[key];
  if(!p) return false;
  state.undoStack.push(state.sourceText);
  if(state.undoStack.length > 200) state.undoStack.shift();
  state.sourceText = state.sourceText.slice(0, p.valueStart) + newValueStr + state.sourceText.slice(p.valueEnd);
  reparse();
  renderAll();
  return true;
}

function undo(){
  if(!state.undoStack.length) return;
  state.sourceText = state.undoStack.pop();
  reparse();
  renderAll();
  setStatus('Undid last change.');
}

/* ---------- rendering ---------- */
function renderAll(){
  renderStageSize();
  renderElements();
  renderSidebar();
  renderLegend();
  renderProps();
  updateSelectedStatus();
}

function renderStageSize(){
  const w = Math.round(BASE_W * state.scale);
  const h = Math.round(BASE_H * state.scale);
  els.stage.style.width = w + 'px';
  els.stage.style.height = h + 'px';
  const gridPx = Math.round(50 * state.scale);
  els.stage.style.backgroundSize = `${gridPx}px ${gridPx}px, ${gridPx}px ${gridPx}px`;
  els.stage.classList.toggle('no-grid', !state.showGrid);
  els.stageLabel.textContent = `${state.fileName || ''}  —  base 800×600  @ ${state.scale}x  =  ${w}×${h}px`;
}

function elMatchesFilter(el){
  const q = els.search.value.trim().toLowerCase();
  if(!q) return true;
  return el.name.toLowerCase().includes(q) || el.type.toLowerCase().includes(q);
}

function renderElements(){
  els.stage.innerHTML = '';
  state.elements.forEach((el, idx)=>{
    if(state.editorHidden.has(idx)) return; // editor-only decluttering, independent of the file's visible= flag
    if(!state.showHidden && !el.visible) return;
    if(!elMatchesFilter(el)) return;
    const box = buildBox(el, idx);
    els.stage.appendChild(box);
  });
}

function buildBox(el, idx){
  const [x1,y1,x2,y2] = el.rect;
  const w = (x2-x1) * state.scale;
  const h = (y2-y1) * state.scale;
  const box = document.createElement('div');
  box.className = 'el-box' + (idx===state.selected ? ' selected' : '') + (!el.visible ? ' dim' : '');
  box.style.setProperty('--box-color', colorForType(el.type));
  box.style.left = (x1*state.scale) + 'px';
  box.style.top = (y1*state.scale) + 'px';
  box.style.width = Math.max(w,1) + 'px';
  box.style.height = Math.max(h,1) + 'px';
  box.dataset.index = idx;

  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = `${el.type}:${el.name}`;
  box.appendChild(tag);

  box.addEventListener('mousedown', (e)=> startDrag(e, idx));

  if(idx === state.selected){
    ['n','s','e','w','ne','nw','se','sw'].forEach(dir=>{
      const h2 = document.createElement('div');
      h2.className = 'handle h-'+dir;
      h2.addEventListener('mousedown', (e)=>{ e.stopPropagation(); startResize(e, idx, dir); });
      box.appendChild(h2);
    });
  }
  return box;
}

/* ---------- sidebar list ---------- */
const EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_SHUT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.9 5.1A11 11 0 0 1 12 5c7 0 11 7 11 7a13.6 13.6 0 0 1-3.1 3.8M6.2 6.2C3.6 7.9 2 12 2 12s2.5 4.3 6.2 5.9"/></svg>';

function renderSidebar(){
  els.sidebarList.innerHTML = '';
  els.elCount.textContent = state.elements.length ? `${state.elements.length}` : '';
  state.elements.forEach((el, idx)=>{
    if(!elMatchesFilter(el)) return;
    const isEditorHidden = state.editorHidden.has(idx);
    const row = document.createElement('div');
    row.className = 'el-row' + (idx===state.selected ? ' selected' : '') + (!el.visible ? ' hidden-el' : '') + (isEditorHidden ? ' eye-off' : '');

    const eye = document.createElement('button');
    eye.className = 'eye-btn' + (isEditorHidden ? ' off' : '');
    eye.innerHTML = isEditorHidden ? EYE_SHUT : EYE_OPEN;
    eye.title = isEditorHidden ? 'Hidden in editor — click to show on canvas' : 'Visible in editor — click to hide from canvas';
    eye.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(state.editorHidden.has(idx)) state.editorHidden.delete(idx); else state.editorHidden.add(idx);
      renderElements(); renderSidebar();
    });

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = colorForType(el.type);
    const nm = document.createElement('span');
    const indentClass = el.depth>=3 ? 'indent3' : el.depth===2 ? 'indent2' : el.depth===1 ? 'indent1' : '';
    nm.className = 'nm ' + indentClass;
    nm.textContent = el.name;
    const tp = document.createElement('span');
    tp.className = 'tp';
    tp.textContent = el.type;
    row.appendChild(eye); row.appendChild(dot); row.appendChild(nm); row.appendChild(tp);
    row.addEventListener('click', ()=>{ selectElement(idx); scrollElementIntoView(idx); });
    els.sidebarList.appendChild(row);
  });
}

function renderLegend(){
  const seen = new Set(state.elements.map(e=>e.type));
  els.legend.innerHTML = '';
  Array.from(seen).sort().forEach(t=>{
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = colorForType(t);
    item.appendChild(dot);
    item.appendChild(document.createTextNode(t));
    els.legend.appendChild(item);
  });
}

function scrollElementIntoView(idx){
  const el = state.elements[idx];
  if(!el) return;
  const [x1,y1,x2,y2] = el.rect;
  const cx = ((x1+x2)/2) * state.scale;
  const cy = ((y1+y2)/2) * state.scale;
  const area = els.canvasArea;
  area.scrollTo({
    left: Math.max(0, cx - area.clientWidth/2),
    top: Math.max(0, cy - area.clientHeight/2),
    behavior:'smooth'
  });
}

/* ---------- properties panel ---------- */
function renderProps(){
  const el = state.elements[state.selected];
  if(!el){
    els.propsBody.innerHTML = '<div class="empty-hint">Select an element on the canvas or from the list to edit its rect.</div>';
    return;
  }
  const [x1,y1,x2,y2] = el.rect;
  const w = x2-x1, h = y2-y1;
  els.propsBody.innerHTML = `
    <div class="prop-title">${escapeHtml(el.name)}</div>
    <div class="prop-sub">${escapeHtml(el.type)}${el.parent ? ' — inside ' + escapeHtml(el.parent) : ''}</div>
    <div class="grid2">
      <div class="field-group"><label class="field-label">X (left)</label><input type="number" id="pf-x1" value="${x1}"></div>
      <div class="field-group"><label class="field-label">Y (top)</label><input type="number" id="pf-y1" value="${y1}"></div>
      <div class="field-group"><label class="field-label">Width</label><input type="number" id="pf-w" value="${w}" min="1"></div>
      <div class="field-group"><label class="field-label">Height</label><input type="number" id="pf-h" value="${h}" min="1"></div>
    </div>
    <div class="grid2">
      <div class="field-group"><label class="field-label">X2 (right)</label><input type="number" id="pf-x2" value="${x2}"></div>
      <div class="field-group"><label class="field-label">Y2 (bottom)</label><input type="number" id="pf-y2" value="${y2}"></div>
    </div>
    <div class="kv"><span>rect =</span><b>${x1},${y1},${x2},${y2}</b></div>
    ${el.text ? `<div class="kv"><span>text</span><b>${escapeHtml(el.text)}</b></div>` : ''}

    <div class="field-group" style="margin-top:10px;">
      <label class="field-label">draw_order</label>
      <input type="number" id="pf-draw-order" value="${el.props.draw_order ? escapeHtml(el.props.draw_order.value) : ''}"
        ${el.props.draw_order ? '' : 'disabled placeholder="not set in file"'}>
    </div>

    <div class="field-group" style="margin-top:10px;">
      <label class="field-label">texture</label>
      <input type="text" id="pf-texture" value="${el.props.texture ? escapeHtml(el.props.texture.value) : ''}"
        style="width:100%; font-family:var(--mono);"
        ${el.props.texture ? '' : 'disabled placeholder="not set in file"'}>
    </div>

    <div class="field-group" style="margin-top:10px;">
      <label class="field-label">visible (file property)</label>
      <label class="toggle-row" style="margin-top:2px;">
        <input type="checkbox" id="pf-visible" ${el.visible ? 'checked' : ''} ${el.props.visible ? '' : 'disabled'}>
        ${el.props.visible ? (el.visible ? 'true' : 'false') : 'not set (defaults to true)'}
      </label>
    </div>
  `;

  const fx1 = document.getElementById('pf-x1');
  const fy1 = document.getElementById('pf-y1');
  const fw  = document.getElementById('pf-w');
  const fh  = document.getElementById('pf-h');
  const fx2 = document.getElementById('pf-x2');
  const fy2 = document.getElementById('pf-y2');

  function applyFromXYWH(){
    const nx1 = parseFloat(fx1.value)||0, ny1 = parseFloat(fy1.value)||0;
    const nw = Math.max(1, parseFloat(fw.value)||1), nh = Math.max(1, parseFloat(fh.value)||1);
    commitRectEdit(state.selected, [nx1, ny1, nx1+nw, ny1+nh]);
  }
  function applyFromCorners(){
    const nx1 = parseFloat(fx1.value)||0, ny1 = parseFloat(fy1.value)||0;
    const nx2 = parseFloat(fx2.value)||0, ny2 = parseFloat(fy2.value)||0;
    commitRectEdit(state.selected, [nx1, ny1, Math.max(nx2,nx1+1), Math.max(ny2,ny1+1)]);
  }
  [fx1,fy1].forEach(f=> f.addEventListener('change', applyFromCorners));
  [fw,fh].forEach(f=> f.addEventListener('change', applyFromXYWH));
  [fx2,fy2].forEach(f=> f.addEventListener('change', applyFromCorners));

  const fOrder = document.getElementById('pf-draw-order');
  const fTexture = document.getElementById('pf-texture');
  const fVisible = document.getElementById('pf-visible');
  if(fOrder && !fOrder.disabled){
    fOrder.addEventListener('change', ()=>{
      const v = parseInt(fOrder.value, 10);
      if(!isNaN(v)) commitPropEdit(state.selected, 'draw_order', String(v));
    });
  }
  if(fTexture && !fTexture.disabled){
    fTexture.addEventListener('change', ()=>{
      const v = fTexture.value.trim();
      if(v) commitPropEdit(state.selected, 'texture', v);
    });
  }
  if(fVisible && !fVisible.disabled){
    fVisible.addEventListener('change', ()=>{
      commitPropEdit(state.selected, 'visible', fVisible.checked ? 'true' : 'false');
    });
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function selectElement(idx){
  state.selected = idx;
  renderElements();
  renderSidebar();
  renderProps();
  updateSelectedStatus();
}

function updateSelectedStatus(){
  const el = state.elements[state.selected];
  els.statusSelected.textContent = el ? `Selected: ${el.type}:${el.name}  rect(${el.rect.join(',')})` : '';
}

/* =========================================================================
   Drag (move) and resize interactions.
   Screen-pixel deltas are always divided by the current zoom scale before
   being applied to the backend rect, so an edit is 1:1 with true game
   pixels at any zoom level -- dragging never stretches or skews the rect,
   it only ever translates/resizes it in exact backend-pixel units.
   ========================================================================= */

let drag = null; // {mode:'move'|'resize', idx, dir, startX, startY, startRect}

function snapVal(v){
  if(!state.snap) return v;
  return Math.round(v/5)*5;
}

function startDrag(e, idx){
  if(e.button !== 0) return;
  e.preventDefault();
  selectElement(idx);
  const el = state.elements[idx];
  drag = { mode:'move', idx, startX:e.clientX, startY:e.clientY, startRect:[...el.rect] };
  document.querySelector(`.el-box[data-index="${idx}"]`)?.classList.add('dragging');
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  els.coordReadout.style.display = 'block';
}

function startResize(e, idx, dir){
  if(e.button !== 0) return;
  e.preventDefault();
  selectElement(idx);
  const el = state.elements[idx];
  drag = { mode:'resize', idx, dir, startX:e.clientX, startY:e.clientY, startRect:[...el.rect] };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  els.coordReadout.style.display = 'block';
}

function onDragMove(e){
  if(!drag) return;
  const dxScreen = e.clientX - drag.startX;
  const dyScreen = e.clientY - drag.startY;
  // exact 1:1 backend-pixel mapping regardless of zoom level
  const dx = dxScreen / state.scale;
  const dy = dyScreen / state.scale;
  let [x1,y1,x2,y2] = drag.startRect;

  if(drag.mode === 'move'){
    const w = x2-x1, h = y2-y1;
    x1 = snapVal(drag.startRect[0] + dx);
    y1 = snapVal(drag.startRect[1] + dy);
    x2 = x1 + w; y2 = y1 + h;
  } else {
    const dir = drag.dir;
    if(dir.includes('w')) x1 = Math.min(snapVal(drag.startRect[0] + dx), x2-1);
    if(dir.includes('e')) x2 = Math.max(snapVal(drag.startRect[2] + dx), x1+1);
    if(dir.includes('n')) y1 = Math.min(snapVal(drag.startRect[1] + dy), y2-1);
    if(dir.includes('s')) y2 = Math.max(snapVal(drag.startRect[3] + dy), y1+1);
  }

  const idx = drag.idx;
  state.elements[idx].rect = [Math.round(x1), Math.round(y1), Math.round(x2), Math.round(y2)];
  const box = document.querySelector(`.el-box[data-index="${idx}"]`);
  if(box){
    box.style.left = (x1*state.scale)+'px';
    box.style.top = (y1*state.scale)+'px';
    box.style.width = Math.max((x2-x1)*state.scale,1)+'px';
    box.style.height = Math.max((y2-y1)*state.scale,1)+'px';
  }
  updateSelectedStatus();
  refreshPropsLive(x1,y1,x2,y2);

  els.coordReadout.style.left = (e.clientX+16)+'px';
  els.coordReadout.style.top = (e.clientY+16)+'px';
  els.coordReadout.textContent = `${Math.round(x1)}, ${Math.round(y1)}  →  ${Math.round(x2)}, ${Math.round(y2)}   (${Math.round(x2-x1)}×${Math.round(y2-y1)})`;
}

function refreshPropsLive(x1,y1,x2,y2){
  const fx1=document.getElementById('pf-x1'), fy1=document.getElementById('pf-y1');
  const fx2=document.getElementById('pf-x2'), fy2=document.getElementById('pf-y2');
  const fw=document.getElementById('pf-w'), fh=document.getElementById('pf-h');
  if(fx1){ fx1.value=Math.round(x1); fy1.value=Math.round(y1); fx2.value=Math.round(x2); fy2.value=Math.round(y2);
    fw.value=Math.round(x2-x1); fh.value=Math.round(y2-y1); }
}

function onDragEnd(e){
  if(!drag) return;
  const idx = drag.idx;
  const finalRect = state.elements[idx].rect;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  els.coordReadout.style.display = 'none';
  drag = null;
  commitRectEdit(idx, finalRect); // splice into source text + reparse + re-render
  selectElement(idx); // idx is stable (no blocks added/removed by an edit)
  setStatus(`Updated ${state.elements[idx]?.name || ''} — rect(${finalRect.join(',')})`);
}

/* =========================================================================
   Wiring: toolbar controls, file open/drop, download, keyboard shortcuts
   ========================================================================= */

els.btnLoad.addEventListener('click', ()=> els.fileInput.click());
els.fileInput.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => loadGasText(reader.result, file.name);
  reader.readAsText(file);
  els.fileInput.value = '';
});

els.exampleSelect.addEventListener('change', ()=>{
  const name = els.exampleSelect.value;
  if(!name) return;
  const text = b64ToUtf8(EXAMPLES_B64[name]);
  loadGasText(text, name);
});

els.scaleSelect.addEventListener('change', ()=>{
  state.scale = parseFloat(els.scaleSelect.value);
  renderAll();
});

document.getElementById('btn-show-all').addEventListener('click', ()=>{
  state.editorHidden.clear();
  renderElements(); renderSidebar();
  setStatus('Showing all elements on canvas.');
});
document.getElementById('btn-hide-all').addEventListener('click', ()=>{
  state.elements.forEach((_,idx)=> state.editorHidden.add(idx));
  renderElements(); renderSidebar();
  setStatus('Hid all elements from canvas (editor-only — file unchanged).');
});

els.toggleGrid.addEventListener('change', ()=>{ state.showGrid = els.toggleGrid.checked; renderStageSize(); });
els.toggleHidden.addEventListener('change', ()=>{ state.showHidden = els.toggleHidden.checked; renderElements(); renderSidebar(); });
els.toggleSnap.addEventListener('change', ()=>{ state.snap = els.toggleSnap.checked; });
els.search.addEventListener('input', ()=>{ renderElements(); renderSidebar(); });

els.btnReset.addEventListener('click', ()=>{
  if(!state.originalText) return;
  if(state.sourceText !== state.originalText && !confirm('Discard all edits made in this session and reload the original file?')) return;
  state.sourceText = state.originalText;
  state.undoStack = [];
  state.selected = -1;
  reparse();
  renderAll();
  setStatus('Reverted to original file contents.');
});

els.btnDownload.addEventListener('click', ()=>{
  if(!state.sourceText) return;
  const blob = new Blob([state.sourceText], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = state.fileName || 'interface.gas';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setStatus(`Downloaded ${state.fileName}.`);
});

/* click empty stage area to deselect */
els.stage.addEventListener('mousedown', (e)=>{
  if(e.target === els.stage){
    state.selected = -1;
    renderElements(); renderSidebar(); renderProps(); updateSelectedStatus();
  }
});

/* drag-and-drop a .gas file onto the window */
['dragenter','dragover'].forEach(evt=>{
  document.addEventListener(evt, (e)=>{ e.preventDefault(); e.stopPropagation(); });
});
document.addEventListener('drop', (e)=>{
  e.preventDefault(); e.stopPropagation();
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => loadGasText(reader.result, file.name);
  reader.readAsText(file);
});

/* keyboard shortcuts */
document.addEventListener('keydown', (e)=>{
  const tag = (e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); }
  if(e.key === 'Escape'){ state.selected=-1; renderElements(); renderSidebar(); renderProps(); updateSelectedStatus(); }
  if((e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key==='ArrowUp'||e.key==='ArrowDown') && state.selected>=0){
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    const [x1,y1,x2,y2] = state.elements[state.selected].rect;
    let d = {ArrowLeft:[-step,0], ArrowRight:[step,0], ArrowUp:[0,-step], ArrowDown:[0,step]}[e.key];
    commitRectEdit(state.selected, [x1+d[0], y1+d[1], x2+d[0], y2+d[1]]);
    selectElement(state.selected);
  }
});

setStatus('Ready. Open a .gas file or pick an example to begin.');

/* expose a small debug handle (harmless, useful for troubleshooting in the console) */
if(typeof window !== 'undefined'){
  window.__gasEditor = { state, selectElement, startDrag, startResize, onDragMove, onDragEnd, undo, commitRectEdit, commitPropEdit, reparse };
}

</script>
</body>
</html>
